services:
  db:
    image: imresamu/postgis:16-3.4
    container_name: onebite-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  server:
    image: ghcr.io/hongsoohyuk/nthing/server:latest
    container_name: onebite-server
    restart: always
    expose:
      - "8080"
    # 모든 시크릿(DB_PASSWORD, JWT_SECRET, OAuth, AWS, FCM 등)은 infra/.env 한 파일로 주입된다.
    # infra/.env 는 배포 시 ONEBITE_ENV_B64 GitHub Secret → base64 decode → /opt/onebite/infra/.env 로
    # 생성된다 (.github/workflows/deploy.yml 참고).
    #
    # Phase 2 푸시(FCM) 자격증명:
    #   infra/.env 에 FIREBASE_CREDENTIALS_BASE64=<base64 of service-account JSON> 한 줄을 추가하면
    #   env_file 로 컨테이너에 자동 주입되어 FcmConfig 가 Firebase Admin SDK 를 활성화한다.
    #   값 생성: macOS `base64 -i server/secrets/firebase-adminsdk.json`
    #           Linux `base64 -w0 server/secrets/firebase-adminsdk.json`
    #   (미설정 시 LoggingFcmSender 폴백 → 푸시만 비활성, 부팅은 정상)
    #   파일 볼륨 마운트를 쓰려면 FIREBASE_CREDENTIALS_PATH 로 경로 지정도 지원(폴백).
    env_file:
      - ./infra/.env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1.0"

  nginx:
    image: nginx:1.27-alpine
    container_name: onebite-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/certbot/conf:/etc/letsencrypt:ro
      - ./infra/certbot/www:/var/www/certbot:ro
    depends_on:
      - server
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  certbot:
    image: certbot/certbot
    container_name: onebite-certbot
    volumes:
      - ./infra/certbot/conf:/etc/letsencrypt
      - ./infra/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  db-data:
