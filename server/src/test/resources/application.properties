spring.application.name=one-bite-server-test

# H2 in-memory DB for tests
spring.datasource.url=jdbc:h2:mem:onebite-test;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=false

# Flyway disabled for tests (use JPA ddl-auto)
spring.flyway.enabled=false

# JWT
jwt.secret=test-secret-key-must-be-at-least-32-bytes-long!!
jwt.expiration=3600000

# Dummy OAuth credentials (not used in tests with mocked clients)
kakao.client-id=test-kakao-id
kakao.client-secret=test-kakao-secret
kakao.redirect-uri=http://localhost:8080/api/auth/callback/kakao
naver.client-id=test-naver-id
naver.client-secret=test-naver-secret
google.client-id=test-google-id
google.client-secret=test-google-secret
google.redirect-uri=http://localhost:8080/api/auth/callback/google
apple.client-id=test-apple-id

# AWS S3 (tests — presigned URL 생성은 실제 호출 없이 서명만 만듦)
aws.region=ap-northeast-2
aws.s3.bucket=onebite-uploads-test
aws.s3.public-url-base=
aws.s3.presign-expiry-seconds=300
