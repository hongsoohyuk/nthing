spring.application.name=one-bite-server

# PostgreSQL + PostGIS
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway (공통 + PostgreSQL 전용 마이그레이션)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration,classpath:db/migration-prod

# JWT (환경 변수로 주입)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Kakao OAuth
kakao.client-id=${KAKAO_CLIENT_ID}
kakao.client-secret=${KAKAO_CLIENT_SECRET}
kakao.redirect-uri=${KAKAO_REDIRECT_URI}

# Naver OAuth
naver.client-id=${NAVER_CLIENT_ID}
naver.client-secret=${NAVER_CLIENT_SECRET}

# Google OAuth
google.client-id=${GOOGLE_CLIENT_ID}
google.client-secret=${GOOGLE_CLIENT_SECRET}
google.redirect-uri=${GOOGLE_REDIRECT_URI}

# Apple Sign In
apple.client-id=${APPLE_CLIENT_ID}
apple.bundle-id=${APPLE_BUNDLE_ID:co.nthing.app}
apple.team-id=${APPLE_TEAM_ID}
apple.key-id=${APPLE_KEY_ID}
apple.private-key-base64=${APPLE_PRIVATE_KEY_BASE64}
apple.redirect-uri=${APPLE_REDIRECT_URI}

# AWS S3
aws.region=${AWS_REGION}
aws.s3.bucket=${S3_BUCKET}
aws.s3.public-url-base=${S3_PUBLIC_URL_BASE:}
aws.s3.presign-expiry-seconds=${S3_PRESIGN_EXPIRY:300}
