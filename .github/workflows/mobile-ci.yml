name: Mobile CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'mobile/**'
      - 'docs/api-spec.md'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'mobile/**'
      - 'docs/api-spec.md'
      - '.github/workflows/mobile-ci.yml'

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      # mobile 은 Vite + React + Capacitor (pnpm). 옛 KMP gradle 빌드 아님.
      # pnpm 11 = mobile/package.json 의 packageManager 와 동일 (로컬과 일치).
      # 9 였을 때 pnpm-workspace.yaml(pnpm 10+ 포맷: patchedDependencies/allowBuilds)을
      # 못 읽어 "packages field missing or empty" 로 install 실패하던 것을 해소.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # pnpm 11 은 Node 22.13+ 필요 (node:sqlite). 로컬과 동일하게 24 사용.
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: mobile/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test:run

      - name: Build
        run: pnpm build
