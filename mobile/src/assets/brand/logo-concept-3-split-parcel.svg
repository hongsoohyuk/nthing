<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Nthing 로고 시안 3 — 반으로 나눈 묶음">
  <title>Split parcel</title>
  <!-- a bulk parcel torn into two offset halves along a dashed seam -->
  <rect x="9" y="16" width="20" height="30" rx="6" fill="#16A34A"/>
  <rect x="35" y="20" width="20" height="30" rx="6" fill="#4ADE80"/>
  <!-- seam where it splits (반띵) -->
  <line x1="32" y1="12" x2="32" y2="52" stroke="#16A34A" stroke-width="2.5"
        stroke-linecap="round" stroke-dasharray="3 5"/>
  <!-- equal-share marks on each half -->
  <rect x="14" y="27" width="10" height="3" rx="1.5" fill="#FFFFFF" opacity="0.9"/>
  <rect x="40" y="31" width="10" height="3" rx="1.5" fill="#FFFFFF" opacity="0.9"/>
</svg>
