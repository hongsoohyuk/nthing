<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Nthing 로고 시안 4d — 반으로 나눈 1/N 코인">
  <title>Divided coin 1/N (pie + fraction)</title>
  <!-- 동그란 코인을 사선(=슬래시)으로 나눠 1과 N을 배치: N분의 1을 동시에 -->
  <circle cx="32" cy="32" r="22" fill="#16A34A" />
  <line x1="45" y1="15" x2="19" y2="49" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" />
  <g fill="none" stroke="#FFFFFF" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- 1 (좌상단) -->
    <path d="M22 22 L25 19.5 L25 30" />
    <!-- N (우하단) -->
    <path d="M35 45 L35 35 L43 45 L43 35" />
  </g>
</svg>
