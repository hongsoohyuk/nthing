<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Nthing 로고 시안 2 — N분의 1 파이">
  <title>N-pie</title>
  <circle cx="32" cy="32" r="22" fill="#16A34A"/>
  <!-- one highlighted slice = your 1/N share (top wedge, 60°) -->
  <path d="M32 32 L32 10 A22 22 0 0 1 51.05 43 Z" fill="#4ADE80"/>
  <!-- division lines splitting the whole into 6 equal portions -->
  <g stroke="#FFFFFF" stroke-width="3" stroke-linecap="round">
    <line x1="32" y1="32" x2="32" y2="10"/>
    <line x1="32" y1="32" x2="51.05" y2="43"/>
    <line x1="32" y1="32" x2="51.05" y2="21"/>
    <line x1="32" y1="32" x2="32" y2="54"/>
    <line x1="32" y1="32" x2="12.95" y2="43"/>
    <line x1="32" y1="32" x2="12.95" y2="21"/>
  </g>
  <circle cx="32" cy="32" r="3" fill="#FFFFFF"/>
</svg>
